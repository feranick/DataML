<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon180.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <title>DataML - pyscript version</title>
  </head>
  <body>
  <b>DataML - pyscript</b><br>
  <br><a id="log">Training log</a>
  <br>Validation: samples 28,29,30
  <br><br><small><a id="importance1">Parametric importance vs decrease in impurity</a><br>
  <a id="importance2">Parametric importance vs mean accuracy</a></small><br><br><br>

  <fieldset>
  <legend>Manual prediction</legend>
  <form name = "MIT_ML" id="mit_ml">
  Model: <select name="model" id="model" onchange="selectModel()" py-change="getModel">
  </select>
  <div id="feature-entries-container">
        </div>
  </form>
  <div name="predict" id="predict"><br><button name="button" id="button" py-click="singlePredict" class="button">Predict</button>
  </div>
</fieldset>

<br><br><fieldset><legend>Predict using CSV file</legend>
<form name = "fileUpload" id="fileUpload">
<input id="inputFile" type="file" name="file" py-change="batchPredict" accept=".csv" class="hidden-button">
<label for="inputFile" class="button">Select a CSV File to predict</label>
<br><br><div id="download-area"></div>
</form>
</fieldset>

<div id="out"><br><text_area id="output"><br></text_area></div>

  <script type="py" src="./main.py" config="./pyscript.toml"></script>
  <script type="text/javascript" src="ml.js" ></script>
  
  <script>
  // Fetch the pre-built list of models
  fetch('models_list.json')
    .then(response => {
        if (!response.ok) throw new Error("models_list.json not found.");
        return response.json();
    })
    .then(models => {
        const modelDropdown = document.getElementById("model");
        modelDropdown.innerHTML = ''; // Clear the dropdown
        
        // Populate the dropdown
        models.forEach(modelName => {
            let option = document.createElement("option");
            option.text = modelName;
            modelDropdown.add(option);
        });
        
        // 1. Restore the user's previously selected index (if any)
        init(); 
        
        // 2. Dispatch a change event. 
        // This automatically triggers selectModel() in JS AND getModel() in Python.
        modelDropdown.dispatchEvent(new Event('change'));
    })
    .catch(error => {
        console.error(error);
        document.getElementById("output").innerHTML = "<b>Error:</b> Could not load models. Please ensure you run 'update_models.py' to generate 'models_list.json' first.";
    });
  </script>
  
  </body>
</html>
